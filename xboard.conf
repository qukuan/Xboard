server {
    listen 80 ; 
    listen 443 ssl http2 ; 
    server_name shop.jichang.one; 
    index index.php index.html index.htm default.php default.htm default.html; 
    proxy_set_header Host $host; 
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
    proxy_set_header X-Forwarded-Host $server_name; 
    proxy_set_header X-Real-IP $remote_addr; 

    proxy_set_header X-Forwarded-Proto $scheme;
    # 支持 WebSocket (XBoard 的推送服务需要)
    proxy_http_version 1.1; 
    proxy_set_header Upgrade $http_upgrade; 
    proxy_set_header Connection "upgrade"; 
    access_log /www/sites/shop.jichang.one/log/access.log main; 
    error_log /www/sites/shop.jichang.one/log/error.log; 
    location ^~ /.well-known/acme-challenge {
        allow all; 
        root /usr/share/nginx/html; 
    }

    # 禁用缓存 确保ws通信实时性
    proxy_read_timeout 60s;
    proxy_buffering off;
    proxy_cache off;
    
    include /www/sites/shop.jichang.one/proxy/*.conf; 
# ......面板NGINX其他信息默认

