services:
  xboard:
    # 这里填写 Docker Hub 或阿里云镜像仓库的镜像名
    image: your-dockerhub-username/xboard:latest 
    container_name: xboard
    restart: always
    networks:
      - 1panel-network
    ports:
      - "7001:7001"
    environment:
      # 切换为 PostgreSQL 支持
      - DB_CONNECTION=pgsql
      # 1Panel PostgreSQL 容器名称（默认为 postgresql，请核对）
      - DB_HOST=postgresql 
      - DB_PORT=5432
      - DB_DATABASE=xboard
      - DB_USERNAME=xboard
      - DB_PASSWORD=填入你的1Panel_Postgres密码
      # 1Panel Redis 容器名称
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=填入你的1Panel_Redis密码
      - ENABLE_CADDY=true
      - ENABLE_WEB=true
      - ENABLE_HORIZON=true
      - ENABLE_WS_SERVER=true
    volumes:
      - ./.docker/.data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  1panel-network:
    external: true